<!doctype html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BroadCast — Diseño & Arquitectura Digital (Vanilla Optimized)</title>
    <meta name="description" content="Diseñador y desarrollador web especializado en soluciones digitales premium." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,800;1,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --primary: #a0ffc3;
            --surface: #0e0e0e;
        }

        body {
            background-color: var(--surface);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Performance Optimized Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% -20%, #1a2a1f 0%, #0e0e0e 70%);
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.15;
            will-change: transform;
        }

        /* Glassmorphism Fallback for Mobile */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        @media (min-width: 768px) {
            .glass {
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
            }
        }

        /* Animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.21, 0.47, 0.32, 0.98);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        .animate-pulse-slow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        /* Mobile specific fixes */
        @supports (-webkit-touch-callout: none) {
            .min-h-screen { height: -webkit-fill-available; }
        }
    </style>
</head>
<body>
    <!-- Persistent Background -->
    <div id="bg-canvas">
        <div class="glow bg-primary w-[70vw] h-[70vw] -top-[20%] -left-[10%]"></div>
        <div class="glow bg-primary w-[80vw] h-[80vw] -bottom-[10%] -right-[10%] opacity-10"></div>
    </div>

    <!-- Navbar -->
    <header class="fixed top-0 w-full z-50 px-4 pt-6">
        <nav class="max-w-[1440px] mx-auto glass rounded-2xl flex items-center h-16 px-6 shadow-2xl">
            <div class="text-xl font-black tracking-tighter uppercase font-headline">BroadCast</div>
            <div class="hidden lg:flex ml-12 gap-8 items-center">
                <a href="#sobre-mi" class="text-sm text-gray-400 hover:text-white transition-colors">Sobre mi</a>
                <a href="#proyectos" class="text-sm text-gray-400 hover:text-white transition-colors">Proyectos</a>
                <a href="#contacto" class="text-sm text-gray-400 hover:text-white transition-colors font-bold text-primary">Contacto</a>
            </div>
            <a href="https://wa.me/5491172023171" class="ml-auto bg-primary text-black px-5 py-2 rounded-lg font-bold text-xs uppercase tracking-widest hover:scale-105 transition-transform">
                Llamada
            </a>
        </nav>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="relative min-h-screen flex items-center justify-center pt-20 px-6">
            <div class="max-w-[1440px] w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div class="text-center lg:text-left">
                    <div class="reveal active inline-flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-xl mb-8 border border-white/10 uppercase font-black text-[10px] tracking-widest text-primary">
                        <span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
                        IMPACTO DIGITAL
                    </div>
                    
                    <h1 class="reveal active font-headline text-5xl md:text-8xl font-black uppercase italic leading-[0.9] tracking-tighter mb-8">
                        DISEÑO <br> <span class="text-white/20">Y Arquitectura</span>
                    </h1>
                    
                    <p class="reveal active text-gray-400 text-lg md:text-xl max-w-lg mx-auto lg:mx-0 mb-10 leading-relaxed">
                        Transformo marcas emergentes en referentes de la industria a través de interfaces minimalistas y experiencias de alto impacto.
                    </p>
                    
                    <div class="reveal active flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                        <button class="bg-primary text-black px-8 py-4 rounded-xl font-black uppercase text-sm tracking-widest hover:brightness-110 transition-all">
                            Agendá una llamada
                        </button>
                        <button class="bg-white/5 border border-white/10 text-white px-8 py-4 rounded-xl font-black uppercase text-sm tracking-widest hover:bg-white/10 transition-all">
                            Mirá mi laburo
                        </button>
                    </div>
                </div>

                <!-- Visual Element -->
                <div class="reveal active hidden lg:flex justify-center">
                    <div class="relative w-[400px] aspect-square bg-white/5 border border-white/20 rounded-[3rem] p-6 shadow-2xl">
                        <div class="w-full h-full bg-black/40 rounded-2xl overflow-hidden grayscale hover:grayscale-0 transition-all duration-700">
                             <img src="/assets/hero/hero-main.png" alt="Hero" class="w-full h-full object-cover">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Portfolio (Simple Static) -->
        <section id="proyectos" class="py-32 px-6 max-w-[1440px] mx-auto">
            <h2 class="reveal font-headline text-4xl md:text-6xl font-black uppercase mb-16 italic tracking-tighter">
                Proyectos <span class="text-white/20">Seleccionados</span>
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Project Card -->
                <div class="reveal group">
                    <div class="glass p-3 rounded-[2.5rem] mb-6 overflow-hidden aspect-video relative">
                        <img src="/assets/projects/web-app-educativa.png" alt="Project" class="w-full h-full object-cover rounded-[2rem] group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <h3 class="font-headline text-3xl font-black italic uppercase tracking-tighter group-hover:text-primary transition-colors">Web Educativa</h3>
                </div>
                <!-- Project Card -->
                <div class="reveal group">
                    <div class="glass p-3 rounded-[2.5rem] mb-6 overflow-hidden aspect-video relative">
                        <img src="/assets/projects/WEB Autopartes.png" alt="Project" class="w-full h-full object-cover rounded-[2rem] group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <h3 class="font-headline text-3xl font-black italic uppercase tracking-tighter group-hover:text-primary transition-colors">E-commerce Autopartes</h3>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Scroll Reveal logic (Lightweight)
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Smooth scroll safe for iOS
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
